name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run python -m pytest -q tests

      - name: Smoke test CLI fixture output
        run: uv run python -m gh_artifact_inspector.cli --from-file tests/fixtures/artifacts.json --json

      - name: Create direct-file artifact probe sample
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          printf 'gh-artifact-inspector direct-file probe sample\n' > workflow-artifact-demo.txt

      - name: Upload direct-file artifact probe sample
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: workflow-artifact-demo.txt
          path: workflow-artifact-demo.txt
          archive: false
          retention-days: 7
